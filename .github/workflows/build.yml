name: Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y xorg-dev libwayland-dev libxkbcommon-dev wayland-protocols libgl1-mesa-dev

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release -j4

    - name: Gather Artifacts
      shell: bash
      run: |
        mkdir -p dist
        
        # Windows CMake outputs to Release/ by default, Unix outputs directly to build/
        if [ "$RUNNER_OS" == "Windows" ]; then
          cp build/Release/cardbox.exe dist/ || true
          cp -r build/Release/rules dist/rules || true
          cp -r build/Release/cards dist/cards || true
          find build/Release -maxdepth 1 -name "*.dll" -exec cp {} dist/ \; || true
        else
          cp build/cardbox dist/ || true
          cp -r build/rules dist/rules || true
          cp -r build/cards dist/cards || true
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cardbox-${{ runner.os }}
        path: dist/