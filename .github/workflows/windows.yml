name: Windows Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release -j4

    - name: Gather Artifacts
      shell: bash
      run: |
        mkdir -p dist
        
        # Copy the executable and assets (CMake outputs to Release/ on Windows by default)
        cp build/Release/cardbox.exe dist/
        cp -r build/Release/rules dist/rules
        cp -r build/Release/cards dist/cards
        
        # Gather any compiled DLLs and place them right next to the executable
        find build/Release -maxdepth 1 -name "*.dll" -exec cp {} dist/ \; || true

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cardbox-windows
        path: dist/